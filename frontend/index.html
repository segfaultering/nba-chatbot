<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Chatbot 🏀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F7941D; --amber: #FFB84D;
      --bg: #0D0F14; --surface: #161A23; --panel: #1E2330; --border: #2A3044;
      --text: #E8EAF0; --muted: #6B7594;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    #root { display: flex; height: 100dvh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 24px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #1a0a00, var(--surface));
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-ball { font-size: 30px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; padding-left: 40px; }
    .sidebar-section { padding: 16px; }
    .section-title { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .chip {
      display: flex; align-items: center; gap: 8px; width: 100%;
      background: transparent; border: 1px solid var(--border); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 12px; padding: 8px 10px;
      border-radius: 7px; cursor: pointer; text-align: left; margin-bottom: 5px;
      transition: all 0.15s;
    }
    .chip:hover:not(:disabled) { border-color: var(--orange); color: var(--amber); background: rgba(247,148,29,0.06); }
    .chip:disabled { opacity: 0.5; cursor: not-allowed; }
    .sidebar-footer { margin-top: auto; padding: 14px 20px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    .badge { background: var(--orange); color: #000; font-weight: 700; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-right: 4px; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: rgba(22,26,35,0.9); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ADE80; box-shadow: 0 0 6px #4ADE80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px; padding: 60px 20px; flex: 1; }
    .welcome-ball { font-size: 64px; filter: drop-shadow(0 0 24px rgba(247,148,29,0.5)); animation: float 3s ease-in-out infinite; }
    .welcome-title { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(135deg, var(--orange), var(--amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .welcome-sub { font-size: 14px; color: var(--muted); max-width: 360px; line-height: 1.6; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    .welcome-chip { background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; }
    .welcome-chip:hover { border-color: var(--orange); color: var(--amber); }

    .row { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .row.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .avatar.bot { background: var(--panel); border: 1px solid var(--border); }
    .avatar.user { background: #c96c00; border: 1px solid var(--orange); }
    .bubble { max-width: 68%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; }
    .bubble.bot { background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .bubble.user { background: var(--orange); color: #000; font-weight: 500; border-bottom-right-radius: 3px; }
    .time { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .row.user .time { text-align: right; }

    .typing { display: flex; gap: 4px; padding: 4px 2px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

    /* Input */
    .input-area { padding: 14px 24px 18px; border-top: 1px solid var(--border); background: rgba(22,26,35,0.9); backdrop-filter: blur(10px); flex-shrink: 0; }
    .input-wrap { display: flex; gap: 8px; align-items: center; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 5px 5px 5px 16px; transition: border-color 0.15s; }
    .input-wrap:focus-within { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(247,148,29,0.08); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 7px 0; resize: none; max-height: 100px; line-height: 1.5; }
    textarea::placeholder { color: var(--muted); }
    .send { width: 36px; height: 36px; border-radius: 7px; background: var(--orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .send:hover:not(:disabled) { background: var(--amber); }
    .send:disabled { background: var(--border); cursor: not-allowed; }
    .hint { font-size: 10px; color: var(--muted); margin-top: 7px; text-align: center; }

    @media (max-width: 600px) {
      .sidebar { display: none; }
      .messages { padding: 14px; }
      .input-area { padding: 10px 14px 14px; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const CHIPS = [
  { icon: '🏀', label: "Who is LeBron James?" },
  { icon: '🐐', label: "Who is the GOAT?" },
  { icon: '🏆', label: "Most NBA championships?" },
  { icon: '⏱️', label: "What is the shot clock?" },
  { icon: '🌟', label: "Who is Stephen Curry?" },
  { icon: '📜', label: "Who invented basketball?" },
  { icon: '💯', label: "100 point game record?" },
  { icon: '📋', label: "How does scoring work?" },
];

const WELCOME_CHIPS = [
  "Who is Michael Jordan?", "How many quarters?",
  "Tell me about the Lakers", "What's a triple-double?",
];

const getTime = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput]       = useState('');
  const [loading, setLoading]   = useState(false);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  const send = useCallback(async (text) => {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setMessages(p => [...p, { id: Date.now(), role: 'user', text: msg, time: getTime() }]);
    setInput('');
    setLoading(true);
    try {
      const res  = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
      const data = await res.json();
      setMessages(p => [...p, { id: Date.now()+1, role: 'bot', text: data.response || "Sorry, couldn't process that.", time: getTime() }]);
    } catch {
      setMessages(p => [...p, { id: Date.now()+1, role: 'bot', text: '⚠️ Connection error. Make sure the backend is running.', time: getTime() }]);
    } finally {
      setLoading(false);
      setTimeout(() => inputRef.current?.focus(), 50);
    }
  }, [input, loading]);

  const onKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

  return (
    <>
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="logo">
            <span className="logo-ball">🏀</span>
            <span className="logo-text">NBA Bot</span>
          </div>
          <div className="logo-sub">Ask me anything hoops</div>
        </div>
        <div className="sidebar-section">
          <div className="section-title">Quick Topics</div>
          {CHIPS.map(c => (
            <button key={c.label} className="chip" onClick={() => send(c.label)} disabled={loading}>
              <span>{c.icon}</span>{c.label}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <span className="badge">56+</span>regex rules covering players, teams, rules, history &amp; records.
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        <div className="topbar">
          <span className="topbar-title">🏀 NBA Chatbot</span>
          <div className="status"><div className="dot" />Live</div>
        </div>

        <div className="messages">
          {messages.length === 0 ? (
            <div className="welcome">
              <div className="welcome-ball">🏀</div>
              <div className="welcome-title">NBA HQ</div>
              <div className="welcome-sub">Your rule-based basketball expert. Ask about players, teams, rules, history, and records.</div>
              <div className="welcome-chips">
                {WELCOME_CHIPS.map(c => <button key={c} className="welcome-chip" onClick={() => send(c)}>{c}</button>)}
              </div>
            </div>
          ) : messages.map(m => (
            <div key={m.id} className={`row ${m.role}`}>
              <div className={`avatar ${m.role}`}>{m.role === 'user' ? '🏀' : '🤖'}</div>
              <div>
                <div className={`bubble ${m.role}`}>{m.text}</div>
                <div className="time">{m.time}</div>
              </div>
            </div>
          ))}
          {loading && (
            <div className="row">
              <div className="avatar bot">🤖</div>
              <div className="bubble bot"><div className="typing"><span/><span/><span/></div></div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        <div className="input-area">
          <div className="input-wrap">
            <textarea ref={inputRef} rows={1} placeholder="Ask about players, teams, rules, records…" value={input} onChange={e => setInput(e.target.value)} onKeyDown={onKey} disabled={loading} />
            <button className="send" onClick={() => send()} disabled={!input.trim() || loading}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={!input.trim() || loading ? '#6B7594' : '#000'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <div className="hint">Enter to send · Shift+Enter for new line</div>
        </div>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
